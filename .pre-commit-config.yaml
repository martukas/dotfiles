exclude: |
  (?x)(
      ^superpack/|
      ^private/|
      ^dotbot/|
      ^linux/gdb/qt5printers/
      )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-xml
      - id: check-json
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: check-executables-have-shebangs
        exclude: "linux\/config\/autostart\/.*"
      - id: check-added-large-files

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.6.2
    hooks:
      - id: prettier
        files: \.(json|yaml|yml)$

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: remove-crlf

  - repo: https://github.com/hukkin/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint-fix

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["--exclude", "SC1091"]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: [-w, -s, -ci, -bn, -i, "2"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: save-guake-settings
        name: save-guake-settings
        description: Dumps Guake settings from dconf to file in repo (Linux only)
        language: script
        entry: ./linux/dconf-guake-hook.py
        pass_filenames: false
        always_run: true
      - id: PSScriptAnalyzer
        name: PSScriptAnalyzer
        description: Run PSScriptAnalyzer on commit
        entry: ./common/powershell/Invoke-PSSAPreCommitHook.ps1
        language: script
        pass_filenames: false
